<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Review Figures</title>
  <style>
    :root{--ink:#20231d;--muted:#6f7469;--line:#d8ceb9;--green:#1f6b55;--red:#934225;--paper:#fffdf7;--shadow:0 18px 46px rgba(58,45,25,.14)}
    *{box-sizing:border-box}body{margin:0;color:var(--ink);background:radial-gradient(circle at 16% 0,#f8e9be 0 22%,transparent 38%),linear-gradient(135deg,#eef0dc,#faf4e7 48%,#e7dec9);font-family:Georgia,"Times New Roman",serif;height:100vh;overflow:hidden}
    button,select{font:inherit}.nav{height:58px;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(255,250,240,.94);border-bottom:1px solid var(--line)}
    .nav-title{font-weight:700;font-size:18px}.nav-center{flex:1;text-align:center}.project-select{min-width:280px;max-width:520px;border:1px solid var(--line);background:var(--paper);border-radius:999px;padding:8px 12px}.nav-right{display:flex;gap:7px;flex-wrap:wrap}.nav a{text-decoration:none;color:var(--ink);border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:var(--paper);font-size:14px}.nav a.active{background:var(--green);border-color:var(--green);color:white}
    .app{height:calc(100vh - 58px);display:grid;grid-template-columns:330px minmax(560px,1fr) 390px;gap:14px;padding:14px}.panel{background:rgba(255,250,240,.95);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;min-height:0;display:flex;flex-direction:column}.head,.tabs{padding:14px;border-bottom:1px solid var(--line)}h1,h2,h3{margin:0;letter-spacing:-.02em}h1{font-size:22px}h2{font-size:18px}.sub{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.35}
    .list,.main,.side{overflow:auto;min-height:0}.list{padding:9px}.card{width:100%;text-align:left;border:1px solid transparent;background:var(--paper);border-radius:12px;padding:10px;margin-bottom:8px;cursor:pointer;color:var(--ink)}.card:hover,.card.active{border-color:var(--green);background:#f2faf0}.title{font-weight:700;font-size:14px}.meta{color:var(--muted);font-size:12px;margin-top:5px;line-height:1.35}.pill{display:inline-block;font-size:11px;padding:3px 7px;border-radius:999px;background:#e4efe4;color:#285a37;margin:5px 4px 0 0}.warn{background:#f8dfd2;color:var(--red)}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:1px solid var(--line);border-radius:999px;background:var(--paper);padding:7px 10px;cursor:pointer}.tab.active{background:var(--green);color:white;border-color:var(--green)}
    .main{background:var(--paper);padding:20px 24px;line-height:1.55}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.box{border:1px solid var(--line);border-radius:14px;background:#fffaf0;padding:12px;min-height:160px}.box img{max-width:100%;display:block;border:1px solid var(--line);border-radius:10px;background:white}.empty{border:1px dashed var(--line);border-radius:12px;padding:18px;color:var(--muted);background:#fffaf0}.field{margin-bottom:13px}.label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}.value{white-space:pre-wrap;line-height:1.45}.side{padding:14px}pre{white-space:pre-wrap;margin:0;font-family:Consolas,monospace;font-size:12px}.kv{display:grid;grid-template-columns:125px 1fr;gap:8px;border-top:1px solid var(--line);padding-top:10px;margin-top:10px}.kv div:nth-child(odd){color:var(--muted);font-size:12px}
    @media(max-width:1100px){body{height:auto;overflow:auto}.app{height:auto;grid-template-columns:1fr}.panel{min-height:360px}.grid{grid-template-columns:1fr}}
  </style>
  <link rel="stylesheet" href="/assets/dashboard/review-ui.css">
</head>
<body>
  <nav class="nav"><div class="nav-title">Review Writer</div><div class="nav-center"><select id="projectSelect" class="project-select"></select></div><div class="nav-right"><a href="/library">Library</a><a href="/discovery">Discovery</a><a href="/matrix">Matrix</a><a href="/blueprint">Blueprint</a><a href="/sections">Sections</a><a class="active" href="/figures">Figures</a><a href="/draft">Draft</a><a href="/final">Final</a></div></nav>
  <main class="app">
    <section class="panel"><div class="head"><h1>Figure Redraw</h1><div id="projectInfo" class="sub">Loading...</div></div><div id="figureList" class="list"></div></section>
    <section class="panel"><div class="head"><h2 id="mainTitle">Figure Check</h2><div id="mainMeta" class="sub"></div></div><div class="tabs"><button class="tab active" data-tab="figure">Figure</button><button class="tab" data-tab="redraw">Redraw</button><button class="tab" data-tab="report">Report</button><button class="tab" data-tab="raw">Raw JSON</button></div><div id="main" class="main"></div></section>
    <section class="panel"><div class="head"><h2>Review Gate</h2><div class="sub">Do not proceed unless source image and redrawn output are both verified.</div></div><div id="summary" class="side"></div></section>
  </main>
  <script src="/assets/dashboard/review-ui.js"></script>
  <script>
    let projects=[],payload=null,selectedProject='',selected=0,tab='figure';
    const $=id=>document.getElementById(id), esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
    const fileUrl=path=>path?`/file?path=${encodeURIComponent(path)}`:'';
    const candidates=()=>{const c=payload?.figure_candidates;const m=payload?.figure_manifest;return Array.isArray(c)?c:(c?.figures||c?.candidates||m?.figures||[])};
    const redrawn=()=>{const r=payload?.redrawn_manifest;return Array.isArray(r)?r:(r?.figures||r?.items||r?.redrawn_figures||[])};
    function rowKey(x,i){return x.figure_id||x.candidate_id||[x.section_id,x.paper_id,x.source_label].filter(Boolean).join(' · ')||String(i)}
    function sourcePath(x){return x.source_image_path||x.source_path||x.image_path||''}
    function outputPath(x){return x.output_path||x.redrawn_path||x.output_image_path||x.redrawn_image||x.image_path||x.path||''}
    function matchRedrawn(c,i){const k=rowKey(c,i);return redrawn().find(r=>rowKey(r,i)===k||r.source_label===c.source_label&&r.paper_id===c.paper_id&&r.section_id===c.section_id)||{}}
    function img(path,label){return path?`<a href="${fileUrl(path)}" target="_blank"><img alt="${esc(label)}" src="${fileUrl(path)}"></a>`:`<div class="empty">No image path resolved.</div>`}
    function md(s){return String(s||'').split(/\n{2,}/).map(b=>{b=b.trim();if(!b)return'';let m=b.match(/^###\s+(.+)/);if(m)return`<h3>${esc(m[1])}</h3>`;m=b.match(/^##\s+(.+)/);if(m)return`<h2>${esc(m[1])}</h2>`;m=b.match(/^#\s+(.+)/);if(m)return`<h1>${esc(m[1])}</h1>`;return`<p>${esc(b).replace(/\n/g,'<br>')}</p>`}).join('')}
    async function loadProjects(){projects=await(await fetch('/api/projects')).json();$('projectSelect').innerHTML=projects.map(p=>`<option value="${esc(p.project_id)}">${esc(p.project_id)}</option>`).join('');if(projects[0])loadProject(projects[0].project_id)}
    async function loadProject(id){selectedProject=id;payload=await(await fetch(`/api/project/${encodeURIComponent(id)}/figures`)).json();selected=0;render()}
    function renderList(){const rows=candidates();$('figureList').innerHTML=rows.map((x,i)=>{const status=x.resolution_status||x.status||'pending';const r=matchRedrawn(x,i);const out=outputPath(r);return`<button class="card ${i===selected?'active':''}" data-idx="${i}"><div class="title">${esc(x.source_label||rowKey(x,i))}</div><div class="meta">${esc(x.section_id||'')} · ${esc(x.paper_id||'')}</div><span class="pill ${status.includes('need')?'warn':''}">${esc(status)}</span><span class="pill ${out?'':'warn'}">${out?'redrawn':'no redraw'}</span></button>`}).join('')||'<div class="empty">No figure candidates found.</div>'}
    function renderMain(){const c=candidates()[selected]||{};const r=matchRedrawn(c,selected);$('mainTitle').textContent=c.source_label||c.figure_id||'Figure Check';$('mainMeta').textContent=[c.section_id,c.paper_id,c.source_type].filter(Boolean).join(' · ');if(tab==='figure'){$('main').innerHTML=`<div class="grid"><div class="box"><h3>Source Candidate</h3>${img(sourcePath(c),c.source_label||c.figure_id||'source figure')}</div><div class="box"><h3>Redrawn Output</h3>${img(outputPath(r),c.source_label||c.figure_id||'redrawn figure')}</div></div><div class="kv"><div>Why selected</div><div>${esc(c.why_selected||c.note)}</div><div>What it shows</div><div>${esc(c.what_it_shows)}</div><div>Claim fit</div><div>${esc(c.fits_paragraph_or_claim)}</div><div>Caption</div><div>${esc(c.source_caption_text||c.caption)}</div><div>Recommended action</div><div>${esc(c.recommended_action)}</div><div>Source PDF</div><div>${esc(c.source_pdf)}</div></div>`}else if(tab==='redraw'){$('main').innerHTML=`<pre>${esc(JSON.stringify(r||{},null,2))}</pre>`}else if(tab==='report'){$('main').innerHTML=md(payload?.figure_redraw_report_md)}else{$('main').innerHTML=`<pre>${esc(JSON.stringify({candidate:c,redrawn:r,manifest:payload?.redrawn_manifest||payload?.figure_manifest},null,2))}</pre>`}}
    function renderSummary(){const rows=candidates(),outs=redrawn();const resolved=rows.filter(x=>sourcePath(x)).length;const selectedRows=rows.filter(x=>x.manuscript_selected).length;const redrawDone=outs.filter(x=>outputPath(x)).length;const needs=rows.filter(x=>String(x.resolution_status||'').includes('need')||x.needs_human_check).length;const status=redrawDone>0&&resolved===rows.length?'Ready after human image verification':'Blocking: source/redraw incomplete';$('projectInfo').textContent=`${selectedProject} · ${payload?.topic||''}`;$('summary').innerHTML=`<div class="field"><div class="label">Status</div><div class="value">${status}</div></div><div class="field"><div class="label">Candidates</div><div class="value">${rows.length}</div></div><div class="field"><div class="label">Manuscript Selected</div><div class="value">${selectedRows}</div></div><div class="field"><div class="label">Source Images Resolved</div><div class="value">${resolved}/${rows.length}</div></div><div class="field"><div class="label">Redrawn Outputs</div><div class="value">${redrawDone}</div></div><div class="field"><div class="label">Needs Human Check</div><div class="value">${needs}</div></div><div class="field"><div class="label">Required Check</div><div class="value">1. 源图必须真实来自对应论文。\\n2. 重绘图只改风格，不改反应、条件、产物和机理。\\n3. 未定位源图的候选不能进入终稿。</div></div>`}
    function render(){renderList();renderMain();renderSummary()}
    $('projectSelect').addEventListener('change',e=>loadProject(e.target.value));$('figureList').addEventListener('click',e=>{const b=e.target.closest('[data-idx]');if(!b)return;selected=Number(b.dataset.idx);tab='figure';document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));render()});document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{tab=t.dataset.tab;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));renderMain()}));loadProjects();
  </script>
</body>
</html>
