<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Review Final</title>
  <link rel="icon" href="data:,">
  <style>
    :root{--ink:#1f2024;--muted:#69707b;--line:#d7cbb7;--green:#1e6a58;--orange:#c46f33;--paper:#fffdf7;--shadow:0 20px 52px rgba(48,39,24,.14)}
    *{box-sizing:border-box}body{margin:0;color:var(--ink);background:radial-gradient(circle at 12% 12%,rgba(30,106,88,.14),transparent 24rem),radial-gradient(circle at 90% 8%,rgba(196,111,51,.15),transparent 28rem),linear-gradient(135deg,#efe3cc,#fbf6ea 46%,#eadfca);font-family:Georgia,"Times New Roman",serif;height:100vh;overflow:hidden}
    button,select{font:inherit}.nav{height:58px;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(255,250,241,.94);border-bottom:1px solid var(--line)}
    .nav-title{font-weight:700;font-size:18px}.nav-center{flex:1;text-align:center}.project-select{min-width:280px;max-width:520px;border:1px solid var(--line);background:var(--paper);border-radius:999px;padding:8px 12px}.nav-right{display:flex;gap:7px;flex-wrap:wrap}.nav a{text-decoration:none;color:var(--ink);border:1px solid var(--line);border-radius:999px;padding:7px 10px;background:var(--paper);font-size:14px}.nav a.active{background:var(--green);border-color:var(--green);color:white}
    .app{height:calc(100vh - 58px);display:grid;grid-template-columns:280px minmax(560px,1fr) 380px;gap:14px;padding:14px}.panel{background:rgba(255,250,241,.95);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;min-height:0;display:flex;flex-direction:column}.head,.tabs{padding:14px;border-bottom:1px solid var(--line)}h1,h2,h3{margin:0;letter-spacing:-.02em}h1{font-size:22px}h2{font-size:18px}.sub{margin-top:6px;color:var(--muted);font-size:13px;line-height:1.35}
    .list,.main,.side{overflow:auto;min-height:0}.list{padding:9px}.item{width:100%;text-align:left;background:var(--paper);border:1px solid transparent;border-radius:14px;padding:11px;margin-bottom:8px;cursor:pointer;color:var(--ink)}.item:hover,.item.active{border-color:var(--green);background:#f2faf0}.item-title{font-weight:700;font-size:15px}.item-meta{color:var(--muted);font-size:12px;margin-top:5px}.pill{display:inline-block;font-size:11px;padding:3px 7px;border-radius:999px;background:#e4efe4;color:#285a37;margin-top:5px}.warn{background:#f9dfd0;color:#8d3e20}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}.tab{border:1px solid var(--line);border-radius:999px;background:var(--paper);padding:7px 10px;cursor:pointer}.tab.active{background:var(--green);color:white;border-color:var(--green)}
    .main{background:var(--paper);padding:30px 36px;line-height:1.62;font-size:16px}.main img{max-width:100%;border:1px solid var(--line);border-radius:10px;display:block;margin:12px auto}.main a{color:var(--green)}.main code{padding:2px 5px;border-radius:6px;background:#efe6d4;color:#5c3c20;font-family:Consolas,monospace;font-size:.9em}.main table{border-collapse:collapse;width:max-content;max-width:100%;display:block;overflow-x:auto;margin:18px 0;background:white;font-size:13px;line-height:1.35}.main td,.main th{border:1px solid #cfc2aa;padding:7px 9px;vertical-align:top}.main th,.main tr:first-child td{background:#efe6d4;font-weight:700}.main details{margin:14px 0;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:#fbf4e5}.main summary{cursor:pointer;font-weight:700;color:var(--green)}
    .side{padding:14px}.field{margin-bottom:13px}.label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}.value{white-space:pre-wrap;line-height:1.45}.empty{border:1px dashed var(--line);border-radius:12px;padding:18px;color:var(--muted);background:#fffaf0}pre{white-space:pre-wrap;margin:0;font-family:Consolas,monospace;font-size:12px}
    @media(max-width:1100px){body{height:auto;overflow:auto}.app{height:auto;grid-template-columns:1fr}.panel{min-height:360px}}
  </style>
  <link rel="stylesheet" href="/assets/dashboard/review-ui.css">
</head>
<body>
  <nav class="nav"><div class="nav-title">Review Writer</div><div class="nav-center"><select id="projectSelect" class="project-select"></select></div><div class="nav-right"><a href="/library">Library</a><a href="/discovery">Discovery</a><a href="/matrix">Matrix</a><a href="/blueprint">Blueprint</a><a href="/sections">Sections</a><a href="/figures">Figures</a><a href="/draft">Draft</a><a class="active" href="/final">Final</a></div></nav>
  <main class="app">
    <section class="panel"><div class="head"><h1>Final Audit</h1><div id="projectInfo" class="sub">Loading...</div></div><div id="docList" class="list"></div></section>
    <section class="panel"><div class="head"><h2 id="mainTitle">Final Draft</h2><div id="mainMeta" class="sub"></div></div><div class="tabs"><button class="tab active" data-doc="final">Final Draft</button><button class="tab" data-doc="audit">Audit Report</button><button class="tab" data-doc="quality">Quality Report</button><button class="tab" data-doc="release">Release Report</button></div><div id="main" class="main"></div></section>
    <section class="panel"><div class="head"><h2>Review Gate</h2><div class="sub">Final gate for content, format, citations, figures and release readiness.</div></div><div id="summary" class="side"></div></section>
  </main>
  <script src="/assets/dashboard/review-ui.js"></script>
  <script>
    let projects=[],payload=null,selectedProject='',doc='final';
    const $=id=>document.getElementById(id), esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
    function fileUrl(path){return path?`/file?path=${encodeURIComponent(path)}`:''}
    function imageSrc(p){return fileUrl(p.startsWith('/')?p:[payload?.paths?.stage_dir,p].filter(Boolean).join('/'))}
    function inlineMd(text){let out='',last=0,re=/!\[([^\]]*)\]\(([^)]+)\)/g,m;while((m=re.exec(text))){out+=esc(text.slice(last,m.index));out+=`<img alt="${esc(m[1])}" src="${imageSrc(m[2])}">`;last=re.lastIndex}return(out+esc(text.slice(last))).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\n/g,'<br>')}
    function md(s){return String(s||'').split(/\n{2,}/).map(b=>{b=b.trim();if(!b)return'';if(/^<table[\\s>]/i.test(b)||/^<details[\\s>]/i.test(b))return b;let m=b.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);if(m)return`<p><img alt="${esc(m[1])}" src="${imageSrc(m[2])}"></p>`;m=b.match(/^###\s+(.+)/);if(m)return`<h3>${esc(m[1])}</h3>`;m=b.match(/^##\s+(.+)/);if(m)return`<h2>${esc(m[1])}</h2>`;m=b.match(/^#\s+(.+)/);if(m)return`<h1>${esc(m[1])}</h1>`;return`<p>${inlineMd(b)}</p>`}).join('')||'<div class="empty">This file has not been generated.</div>'}
    const docs=()=>[{id:'final',title:'Final Draft',text:payload?.final_draft_md,file:'final_draft.md'},{id:'audit',title:'Audit Report',text:payload?.final_audit_report_md,file:'final_audit_report.md'},{id:'quality',title:'Quality Report',text:payload?.quality_report_md,file:'quality_report.md'},{id:'release',title:'Release Report',text:payload?.release_report_md,file:'release_report.md'}];
    async function loadProjects(){projects=await(await fetch('/api/projects')).json();$('projectSelect').innerHTML=projects.map(p=>`<option value="${esc(p.project_id)}">${esc(p.project_id)}</option>`).join('');if(projects[0])loadProject(projects[0].project_id)}
    async function loadProject(id){selectedProject=id;payload=await(await fetch(`/api/project/${encodeURIComponent(id)}/final`)).json();doc='final';render()}
    function renderList(){$('docList').innerHTML=docs().map(d=>`<button class="item ${d.id===doc?'active':''}" data-doc="${d.id}"><div class="item-title">${esc(d.title)}</div><div class="item-meta">${esc(d.file)}</div><span class="pill ${d.text?'':'warn'}">${d.text?'generated':'missing'}</span></button>`).join('')}
    function renderMain(){const d=docs().find(x=>x.id===doc)||docs()[0];$('mainTitle').textContent=d.title;$('mainMeta').textContent=d.file;$('main').innerHTML=md(d.text)}
    function renderSummary(){const final=payload?.final_draft_md||'',audit=payload?.final_audit_report_md||'',quality=payload?.quality_report||{},qualityMd=payload?.quality_report_md||'',release=payload?.release_report_md||'',checkpoints=(payload?.checkpoint_log?.checkpoints||[]);const words=final.split(/\s+/).filter(Boolean).length;const figures=(final.match(/!\[[^\]]*\]\([^)]+\)/g)||[]).length;const refs=(final.match(/\[[0-9,\-\s]+\]/g)||[]).length;const qStatus=quality.status||'missing';const qualitySummary=`${qStatus}\nerrors: ${(quality.errors||[]).length || 0}\nwarnings: ${(quality.warnings||[]).length || 0}\nLLM tasks: ${(quality.llm_judge_tasks||[]).length || 0}\nhuman tasks: ${(quality.human_review_tasks||[]).length || 0}`;const humanCheck=`1. 每个关键结论是否有真实文献支撑。\n2. 每张图是否已经完成源图核验和风格统一。\n3. 是否仍有 TODO、占位引用、空图或未解决审查项。\n4. Quality Report 中的 LLM judge / human review tasks 是否已处理。`;const blockers=[!final&&'missing final_draft',!release&&'missing release_report',qStatus==='fail'&&'quality gate failed',/TODO|citation needed|verification needed|待核查|未确认/i.test(final)&&'unresolved placeholders'].filter(Boolean);$('projectInfo').textContent=`${selectedProject} · ${payload?.topic||''}`;$('summary').innerHTML=`<div class="field"><div class="label">Status</div><div class="value">${blockers.length?`Needs final fixes: ${blockers.join(', ')}`:'Ready for final human export check'}</div></div><div class="field"><div class="label">Word Count</div><div class="value">${words}</div></div><div class="field"><div class="label">Figures In Markdown</div><div class="value">${figures}</div></div><div class="field"><div class="label">Citation-like Marks</div><div class="value">${refs}</div></div><div class="field"><div class="label">Quality Gate</div><div class="value">${esc(qualitySummary)}</div></div><div class="field"><div class="label">Checkpoints</div><div class="value">${checkpoints.length ? checkpoints.map(c=>`${c.index||''}. ${c.checkpoint||c.name}: ${c.status||'unknown'}`).join('\\n') : 'missing'}</div></div><div class="field"><div class="label">Audit Report</div><div class="value">${audit?'generated':'missing'}</div></div><div class="field"><div class="label">Quality Report</div><div class="value">${qualityMd?'generated':'missing'}</div></div><div class="field"><div class="label">Release Report</div><div class="value">${release?'generated':'missing'}</div></div><div class="field"><div class="label">Word Export</div><div class="value" id="docxStatus">${payload?.final_draft_docx_exists?'final_draft.docx ready':'not generated yet'}</div><div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap"><button id="docxGen" class="btn primary" style="padding:7px 12px;border:1px solid var(--green);background:var(--green);color:white;border-radius:999px;cursor:pointer">Generate DOCX</button><a id="docxDownload" class="btn" style="padding:7px 12px;border:1px solid var(--line);background:var(--paper);color:var(--ink);border-radius:999px;text-decoration:none;${payload?.final_draft_docx_exists?'':'opacity:.5;pointer-events:none;'}" href="${payload?.final_draft_docx_exists?fileUrl(payload.final_draft_docx_path):'#'}" download>Download</a></div></div><div class="field"><div class="label">Human Check</div><div class="value">${esc(humanCheck)}</div></div>`}
    function render(){renderList();renderMain();renderSummary();document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.doc===doc))}
    $('projectSelect').addEventListener('change',e=>loadProject(e.target.value));$('docList').addEventListener('click',e=>{const b=e.target.closest('[data-doc]');if(!b)return;doc=b.dataset.doc;render()});document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{doc=t.dataset.doc;render()}));loadProjects();document.addEventListener('click',async e=>{const b=e.target.closest('#docxGen');if(!b||!selectedProject)return;b.disabled=true;const prev=b.textContent;b.textContent='Generating...';try{const r=await fetch(`/api/project/${encodeURIComponent(selectedProject)}/export-docx`,{method:'POST'});const j=await r.json();if(!j.ok){alert('Generate failed: '+(j.error||'unknown'));}else{await loadProject(selectedProject);}}catch(err){alert('Generate failed: '+err);}finally{const btn=document.getElementById('docxGen');if(btn){btn.disabled=false;btn.textContent=prev;}}});
  </script>
</body>
</html>
