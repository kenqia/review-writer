name: Offline CI

on:
  pull_request:
    branches:
      - main
      - feat/chem-review-quality-gates
  push:
    branches:
      - main
      - feat/chem-review-quality-gates
      - feat/orchestrator-rag-generation-pilot

permissions:
  contents: read

concurrency:
  group: offline-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-syntax:
    name: Workflow Syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check workflow definition
        run: python3 scripts/check_offline_ci_workflow.py

  release-readiness:
    name: Release Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Python
        run: python3 --version

      - name: Run offline release gates
        run: make release-readiness-check

  phase6-final:
    name: Phase 6 Final Offline Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install offline SDK inspection dependencies
        run: python -m pip install -r requirements-ci.txt

      - name: Run Phase 6 final offline gate
        run: make bailian-phase6-final-check BAILIAN_SDK_PYTHON=python

  safety-portability:
    name: Secret And Portability Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run safety and portability checks
        run: |
          make quality-check
          make portability-check
          make offline-ci-workflow-check
