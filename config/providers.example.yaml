# Example provider config. Do not put real keys in this file.
# Do not commit .env files.
# Do not write DashScope keys into shell rc files.
# Real network/API calls require explicit user confirmation.
# Smoke checks must pass without keys.

default_provider: offline

providers:
  offline:
    enabled: true
    model: offline-deterministic
  alibaba_openai_compatible:
    enabled: false
    env_key: DASHSCOPE_API_KEY
    workspace_id_env: ALIBABA_WORKSPACE_ID
    region: cn-beijing
    base_url_template: https://{workspace_id}.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
    model: qwen-plus
  dashscope:
    enabled: false
    env_key: DASHSCOPE_API_KEY
    model: qwen-plus

retrieval:
  local:
    enabled: true
    registry_path: review-library/registry/papers.jsonl
  bailian:
    enabled: false
    env_key: DASHSCOPE_API_KEY
    knowledge_base_id_env: BAILIAN_KNOWLEDGE_BASE_ID

image:
  source_figure:
    enabled: true
  alibaba_image:
    enabled: false
    env_key: DASHSCOPE_API_KEY

fallback:
  offline_smoke_required: true
  missing_figures_policy: warning_then_block_final_release
  allow_no_figure_final: false
  no_key_smoke_must_pass: true
  do_not_upload_papers: true
  do_not_create_bailian_knowledge_base: true
