# Example provider config. Do not put real keys in this file.

llm:
  default: local
  providers:
    openai:
      type: openai-compatible
      base_url: https://api.openai.com/v1
      api_key_env: OPENAI_API_KEY
      model: gpt-4.1
    dashscope_qwen:
      type: dashscope
      base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api_key_env: DASHSCOPE_API_KEY
      model: qwen-plus
    local:
      type: openai-compatible
      base_url_env: LOCAL_LLM_BASE_URL
      api_key_env: LOCAL_LLM_API_KEY
      model: local-open-source

retrieval:
  default: local_library
  providers:
    local_library:
      type: filesystem
      library_dir: ${REVIEW_WRITER_DATA_ROOT}/review-library
    alibaba_bailian_kb:
      type: bailian-knowledge-base
      api_key_env: DASHSCOPE_API_KEY
      kb_id_env: ALIBABA_BAILIAN_KB_ID
    mcp_paper_search:
      type: optional-mcp
      enabled: false

image:
  default: noop
  providers:
    source_figure_extraction:
      type: local-mineru-assets
    redraw_existing_source_figure:
      type: image-edit
      provider: openai-compatible
      api_key_env: OPENAI_API_KEY
    alibaba_wan_qwen_image:
      type: alibaba-image
      api_key_env: ALIBABA_IMAGE_API_KEY
    noop:
      type: noop
      behavior: warn-and-skip

fallback:
  offline_smoke_required: true
  missing_figures_policy: warning_then_block_final_release
  allow_no_figure_final: false
